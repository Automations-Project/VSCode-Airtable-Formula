name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
      - name: Verify npm tarball contents
        shell: bash
        run: |
          cd packages/mcp-server
          npm pack --dry-run 2>&1 | tee /tmp/pack-output.txt || true
          if grep -q "dev-tools/" /tmp/pack-output.txt 2>/dev/null; then
            echo "ERROR: dev-tools/ in tarball" && exit 1
          fi
          echo "Tarball contents clean"
