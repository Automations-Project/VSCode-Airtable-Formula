name: Guard Release Tag

on:
  release:
    types: [published, prereleased]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Validate tag prefix
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [[ "$TAG" == mcp-server/v* ]] || [[ "$TAG" == extension/v* ]]; then
            echo "Valid: $TAG"
          else
            echo "ERROR: '$TAG' does not match mcp-server/vX.Y.Z or extension/vX.Y.Z"
            exit 1
          fi
